name: Deploy production — Monitor API (Cloudflare Workers)

on:
  workflow_run:
    workflows: ['Build & quality checks — Monitor API']
    types:
      - completed
  workflow_dispatch:

concurrency:
  group: deploy-monitor-api-production
  cancel-in-progress: false

permissions:
  contents: read
  actions: read

jobs:
  deploy:
    name: Cloudflare Workers Production (Monitor API)
    runs-on: ubuntu-latest
    environment: PROD
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'main' &&
        github.event.workflow_run.head_repository.full_name == github.repository
      )
    env:
      CLOUDFLARE_API_TOKEN: ${{ vars.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
      MONITOR_CHECKS_TOKEN: ${{ vars.MONITOR_CHECKS_TOKEN }}
      MONITOR_D1_DATABASE_NAME: ${{ vars.MONITOR_D1_DATABASE_NAME }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.sha || github.event.workflow_run.head_sha }}
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build monitor-api
        run: npm run build -w @tribus-monitor/monitor-api

      - name: Sync MONITOR_CHECKS_TOKEN secret
        working-directory: apps/monitor-api
        run: |
          echo "$MONITOR_CHECKS_TOKEN" | npx wrangler secret put MONITOR_CHECKS_TOKEN

      - name: Apply D1 migrations (remote)
        working-directory: apps/monitor-api
        run: |
          DB_NAME="${MONITOR_D1_DATABASE_NAME:-tribus_monitor_db}"
          npx wrangler d1 migrations apply "$DB_NAME" --remote

      - name: Deploy monitor-api via Wrangler
        working-directory: apps/monitor-api
        run: npx wrangler deploy
