name: Build & quality checks — Check Runner

on:
  push:
    branches: [main, development]
    paths:
      - 'apps/check-runner/**'
      - 'packages/core/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/ci-check-runner.yml'
  pull_request:
    branches: [main, development]
    paths:
      - 'apps/check-runner/**'
      - 'packages/core/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/ci-check-runner.yml'

concurrency:
  group: ci-check-runner-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Lint, Typecheck, Test & Build (Check Runner)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck -w @tribus-monitor/check-runner

      - name: Lint
        run: npm run lint -w @tribus-monitor/check-runner

      - name: Tests
        run: npm run test -w @tribus-monitor/check-runner

      - name: Build
        run: npm run build -w @tribus-monitor/check-runner
