name: Tests & coverage — Tribus Monitor

on:
  push:
    branches: [main, development]
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/publish-coverage-monitor.yml'
  pull_request:
    branches: [main, development]
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/publish-coverage-monitor.yml'
  workflow_dispatch:

concurrency:
  group: tests-coverage-monitor-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

jobs:
  tests-and-coverage:
    name: Test all workspaces
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate coverage reports
        run: >
          npm run test -w @tribus-monitor/core -- --coverage --reporter=json --outputFile=.vitest-coverage.json &&
          npm run test -w @tribus-monitor/monitor-api -- --coverage --reporter=json --outputFile=.vitest-coverage.json &&
          npm run test -w @tribus-monitor/check-runner -- --coverage --reporter=json --outputFile=.vitest-coverage.json &&
          npm run test -w @tribus-monitor/dashboard -- --coverage --reporter=json --outputFile=.vitest-coverage.json

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: monitor-coverage-reports
          path: |
            packages/core/.vitest-coverage.json
            apps/monitor-api/.vitest-coverage.json
            apps/check-runner/.vitest-coverage.json
            apps/dashboard/.vitest-coverage.json

  publish-coverage:
    name: Publish coverage to monitor-api
    needs: tests-and-coverage
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: PROD
    env:
      MONITOR_API_URL: ${{ vars.MONITOR_API_URL }}
      MONITOR_COVERAGE_TOKEN: ${{ vars.MONITOR_COVERAGE_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Download coverage reports
        uses: actions/download-artifact@v4
        with:
          name: monitor-coverage-reports
          path: .

      - name: Publish coverage snapshot
        run: >
          node scripts/publish-coverage.mjs
          --repo-key tribus-monitor
          --repo-name "Tribus Monitor"
          --report packages/core/.vitest-coverage.json
          --report apps/monitor-api/.vitest-coverage.json
          --report apps/check-runner/.vitest-coverage.json
          --report apps/dashboard/.vitest-coverage.json
