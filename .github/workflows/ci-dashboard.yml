name: Build & quality checks — Dashboard

on:
  push:
    branches: [main, development]
    paths:
      - 'apps/dashboard/**'
      - 'packages/core/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/ci-dashboard.yml'
  pull_request:
    branches: [main, development]
    paths:
      - 'apps/dashboard/**'
      - 'packages/core/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/ci-dashboard.yml'

concurrency:
  group: ci-dashboard-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Format, Lint, Typecheck, Test & Build (Dashboard)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Typecheck
        run: npm run typecheck -w @tribus-monitor/dashboard

      - name: Lint
        run: npm run lint -w @tribus-monitor/dashboard

      - name: Test
        run: npm run test -w @tribus-monitor/dashboard

      - name: Build
        run: npm run build -w @tribus-monitor/dashboard
