name: CI Dashboard

on:
  push:
    branches: [main]
    paths:
      - 'apps/dashboard/**'
      - 'packages/core/**'
      - 'package.json'
  pull_request:
    paths:
      - 'apps/dashboard/**'
      - 'packages/core/**'
      - 'package.json'

jobs:
  dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run typecheck -w @tribus-monitor/dashboard
      - run: npm run lint -w @tribus-monitor/dashboard
      - run: npm run test -w @tribus-monitor/dashboard
      - run: npm run build -w @tribus-monitor/dashboard
